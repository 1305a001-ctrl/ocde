services:
  ocde:
    image: ghcr.io/1305a001-ctrl/ocde:latest
    container_name: ocde
    restart: unless-stopped
    env_file:
      - /srv/secrets/ocde.env
    networks:
      - infra-net
    ports:
      - "127.0.0.1:8014:8014"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,json; r=urllib.request.urlopen('http://127.0.0.1:8014/health'); j=json.load(r); raise SystemExit(0 if j.get('status')=='ok' else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  infra-net:
    external: true
    name: infra-net
